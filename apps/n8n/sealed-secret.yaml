---
# Generate this file with:
# N8N_ENCRYPTION_KEY='...' scripts/generate-n8n-sealed-secret.sh
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: n8n-secret
  namespace: n8n
spec:
  encryptedData:
    N8N_ENCRYPTION_KEY: REPLACE_WITH_KUBESEAL_ENCRYPTED_N8N_ENCRYPTION_KEY
  template:
    metadata:
      name: n8n-secret
      namespace: n8n
      labels:
        app.kubernetes.io/name: n8n
        app.kubernetes.io/part-of: homelab
